    <!-- Script modificado para las nuevas clases de botones -->
    <script>
        function cambiarVista(idVista, btnElement) {
            // 1. Ocultar todas las imágenes
            const imagenes = document.querySelectorAll('.reporte-img');
            imagenes.forEach(img => {
                img.classList.add('hidden');
                img.classList.remove('fade-in');
                void img.offsetWidth; // trigger reflow para reiniciar animación
                img.classList.add('fade-in');
            });

            // 2. Mostrar la imagen seleccionada
            document.getElementById(idVista).classList.remove('hidden');

            // 3. Resetear estilos de todos los botones a INACTIVO
            const botones = document.querySelectorAll('.tab-btn');
            botones.forEach(btn => {
                btn.className = "tab-btn relative px-4 py-2 text-sm font-semibold rounded-lg bg-white text-gray-600 border border-gray-300 hover:bg-gray-50 hover:text-blue-600 transition-colors flex items-center gap-2";
            });

            // 4. Aplicar estilo de ACTIVO al botón clickeado
            btnElement.className = "tab-btn active relative px-4 py-2 text-sm font-semibold rounded-lg bg-blue-600 text-white shadow-md transition-colors flex items-center gap-2";
        }

        function abrirPantallaCompleta() {
            const imagenActiva = document.querySelector('.reporte-img:not(.hidden)');
            if (imagenActiva) {
                if (imagenActiva.requestFullscreen) {
                    imagenActiva.requestFullscreen();
                } else if (imagenActiva.webkitRequestFullscreen) {
                    imagenActiva.webkitRequestFullscreen();
                } else if (imagenActiva.msRequestFullscreen) {
                    imagenActiva.msRequestFullscreen();
                }
            }
        }
    </script>
